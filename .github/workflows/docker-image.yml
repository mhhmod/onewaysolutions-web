name: Build Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/mhhmod/onewaysolutions-web:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://oqkojvazjtqjgjrufxug.supabase.co
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=sb_publishable_8jh8eQtXQfD6Lt4PKv_2pQ_oYLAz5LX
            NEXT_PUBLIC_SITE_URL=https://onewaysolutions-eg.com
            NEXT_PUBLIC_ADMIN_URL=https://admin.onewaysolutions-eg.com
